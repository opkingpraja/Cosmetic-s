<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Anntya Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#030306;--surface:#09090f;--card:#0f0f17;--card2:#14141e;
      --border:#1a1a26;--border2:#222232;
      --accent:#6b4de6;--accent2:#a855f7;--accent-glow:rgba(107,77,230,0.22);
      --text:#e8e8f2;--text2:#9898b8;--muted:#55556e;
      --error:#f05050;--success:#00c07f;--price:#00d97e;
    }

    html,body{height:100%;overflow:hidden;}

    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px;position:relative;
    }

    /* ── Animated Grid Background ── */
    .grid-bg{
      position:fixed;inset:0;z-index:0;
      background-image:
        linear-gradient(rgba(107,77,230,0.028) 1px,transparent 1px),
        linear-gradient(90deg,rgba(107,77,230,0.028) 1px,transparent 1px);
      background-size:52px 52px;
      animation:gridShift 22s linear infinite;
    }
    @keyframes gridShift{
      0%{background-position:0 0;}
      100%{background-position:52px 52px;}
    }

    /* ── Radial Glows ── */
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 18% 10%,rgba(107,77,230,0.14) 0%,transparent 65%),
        radial-gradient(ellipse 50% 40% at 82% 88%,rgba(168,85,247,0.1) 0%,transparent 65%),
        radial-gradient(ellipse 30% 35% at 60% 30%,rgba(80,40,200,0.05) 0%,transparent 60%);
      pointer-events:none;z-index:0;
    }

    /* ── Floating orbs ── */
    .orb{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;
      animation:orbFloat 9s ease-in-out infinite;}
    .orb1{width:300px;height:300px;background:rgba(107,77,230,0.09);
      top:-90px;left:-90px;animation-delay:0s;}
    .orb2{width:240px;height:240px;background:rgba(168,85,247,0.07);
      bottom:-70px;right:-70px;animation-delay:-4.5s;}
    .orb3{width:180px;height:180px;background:rgba(107,77,230,0.05);
      top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-2s;}
    @keyframes orbFloat{
      0%,100%{transform:translate(0,0) scale(1);}
      33%{transform:translate(22px,-22px) scale(1.08);}
      66%{transform:translate(-16px,16px) scale(0.93);}
    }

    /* ── Particles ── */
    .particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .particle{position:absolute;width:2px;height:2px;border-radius:50%;
      background:var(--accent2);opacity:0;
      animation:particleFly 7s ease-in-out infinite;}
    @keyframes particleFly{
      0%{opacity:0;transform:translateY(0) scale(0);}
      20%,80%{opacity:.4;transform:translateY(-44px) scale(1);}
      100%{opacity:0;transform:translateY(-88px) scale(0);}
    }
    .p1{left:15%;top:80%;animation-delay:0s;}
    .p2{left:30%;top:85%;animation-delay:1.1s;}
    .p3{left:50%;top:75%;animation-delay:2.2s;}
    .p4{left:70%;top:82%;animation-delay:1.6s;}
    .p5{left:85%;top:78%;animation-delay:.6s;}
    .p6{left:60%;top:90%;animation-delay:3.1s;}
    .p7{left:22%;top:70%;animation-delay:2.7s;}
    .p8{left:78%;top:65%;animation-delay:3.8s;}

    /* ── Scanning line ── */
    .scan-line{
      position:fixed;top:0;left:0;right:0;height:1.5px;
      background:linear-gradient(90deg,transparent,rgba(107,77,230,0.5),transparent);
      z-index:0;animation:scan 5s linear infinite;pointer-events:none;
    }
    @keyframes scan{
      0%{top:-2px;opacity:0;}
      8%{opacity:1;}
      92%{opacity:1;}
      100%{top:100%;opacity:0;}
    }

    /* ── Login Box ── */
    .login-box{
      position:relative;z-index:1;
      width:100%;max-width:420px;
      background:rgba(9,9,15,0.88);
      border:1px solid var(--border2);
      border-radius:28px;
      padding:46px 40px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 36px 90px rgba(0,0,0,0.7),
        0 0 60px rgba(107,77,230,0.07);
      backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      animation:boxAppear 0.7s cubic-bezier(.34,1.4,.64,1) both;
    }
    @keyframes boxAppear{
      from{opacity:0;transform:translateY(36px) scale(0.95);}
      to{opacity:1;transform:translateY(0) scale(1);}
    }

    /* Corner accent lines */
    .login-box::before{
      content:'';position:absolute;top:0;left:0;
      width:90px;height:90px;border-radius:28px 0 0 0;
      border-top:1.5px solid rgba(107,77,230,0.45);
      border-left:1.5px solid rgba(107,77,230,0.45);
      pointer-events:none;
    }
    .login-box::after{
      content:'';position:absolute;bottom:0;right:0;
      width:90px;height:90px;border-radius:0 0 28px 0;
      border-bottom:1.5px solid rgba(168,85,247,0.35);
      border-right:1.5px solid rgba(168,85,247,0.35);
      pointer-events:none;
    }

    /* ── Logo ── */
    .logo{text-align:center;margin-bottom:30px;}
    .logo-ring{
      display:inline-flex;align-items:center;justify-content:center;
      width:72px;height:72px;border-radius:22px;
      background:linear-gradient(135deg,rgba(107,77,230,0.15),rgba(168,85,247,0.07));
      border:1px solid rgba(107,77,230,0.32);
      margin-bottom:16px;position:relative;
      animation:ringPulse 3.5s ease-in-out infinite;
    }
    @keyframes ringPulse{
      0%,100%{box-shadow:0 0 0 0 rgba(107,77,230,0);}
      50%{box-shadow:0 0 0 10px rgba(107,77,230,0.08);}
    }
    .logo-icon{font-size:34px;animation:float 3.8s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

    .logo h1{
      font-family:'Syne',sans-serif;font-size:28px;font-weight:800;
      background:linear-gradient(140deg,#fff 0%,var(--accent2) 55%,var(--accent) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      letter-spacing:-0.5px;line-height:1.1;
    }
    .logo p{font-size:11.5px;color:var(--muted);margin-top:7px;font-weight:400;letter-spacing:0.2px}

    /* Admin badge */
    .admin-badge{
      display:inline-flex;align-items:center;gap:6px;
      font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
      color:var(--accent2);
      border:1px solid rgba(168,85,247,0.24);
      background:rgba(168,85,247,0.06);
      padding:5px 14px;border-radius:100px;margin-bottom:20px;
    }
    .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);
      animation:blink 2s ease infinite;flex-shrink:0;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

    /* ── Divider ── */
    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:22px 0;}

    /* ── Field ── */
    .field{margin-bottom:18px;}
    label{
      display:block;font-size:10.5px;font-weight:700;
      letter-spacing:1.2px;text-transform:uppercase;
      color:var(--muted);margin-bottom:9px;
    }

    .input-wrap{position:relative;}
    input[type="password"],input[type="text"]{
      width:100%;
      background:rgba(20,20,30,0.85);
      border:1px solid var(--border2);
      border-radius:13px;
      padding:14px 48px 14px 17px;
      font-family:'DM Sans',sans-serif;
      font-size:14px;font-weight:400;
      color:var(--text);outline:none;
      transition:border-color 0.22s,box-shadow 0.22s,background 0.22s;
      letter-spacing:0.8px;
    }
    input::placeholder{color:var(--muted);letter-spacing:0px;font-size:13px;}
    input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow);
      background:rgba(20,20,32,0.98);
    }
    input.error-field{
      border-color:var(--error);
      box-shadow:0 0 0 3px rgba(240,80,80,0.16);
      animation:shake .35s ease;
    }
    @keyframes shake{
      0%,100%{transform:translateX(0);}
      20%,60%{transform:translateX(-6px);}
      40%,80%{transform:translateX(6px);}
    }

    /* Eye toggle */
    .eye-btn{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:var(--muted);font-size:16px;padding:4px;
      transition:color 0.15s;line-height:1;
    }
    .eye-btn:hover{color:var(--text2);}

    /* Error msg */
    .err-msg{
      display:none;align-items:center;gap:6px;
      margin-top:10px;
      font-size:12px;font-weight:500;color:var(--error);
    }
    .err-msg.show{display:flex;}

    /* ── Submit button ── */
    .btn-login{
      width:100%;padding:15px;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
      color:#fff;border:none;border-radius:14px;
      font-family:'DM Sans',sans-serif;
      font-size:14px;font-weight:700;
      cursor:pointer;margin-top:6px;
      box-shadow:0 8px 28px rgba(107,77,230,0.36);
      transition:all 0.22s;
      display:flex;align-items:center;justify-content:center;gap:8px;
      position:relative;overflow:hidden;
      letter-spacing:0.3px;
    }
    .btn-login::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.16),transparent);
      transform:translateX(-100%);transition:transform .55s;
    }
    .btn-login:hover::after{transform:translateX(100%);}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(107,77,230,0.46);}
    .btn-login:active{transform:translateY(0);}
    .btn-login:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

    .spinner{
      width:15px;height:15px;
      border:2px solid rgba(255,255,255,0.25);
      border-top-color:#fff;border-radius:50%;
      animation:spin 0.65s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── Footer ── */
    .footer-note{
      text-align:center;margin-top:24px;
      font-size:11px;color:var(--muted);font-weight:400;line-height:1.8;
    }
    .footer-note .lock{font-size:13px;margin-right:4px;}

    /* ── Security line ── */
    .security-line{
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin-top:18px;font-size:9.5px;color:rgba(85,85,110,0.55);
      font-weight:600;letter-spacing:.8px;text-transform:uppercase;
    }
    .sec-dot{width:3px;height:3px;border-radius:50%;background:rgba(85,85,110,0.4);}
  </style>
</head>
<body>

  <!-- Background FX -->
  <div class="grid-bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="scan-line"></div>
  <div class="particles">
    <div class="particle p1"></div><div class="particle p2"></div>
    <div class="particle p3"></div><div class="particle p4"></div>
    <div class="particle p5"></div><div class="particle p6"></div>
    <div class="particle p7"></div><div class="particle p8"></div>
  </div>

  <div class="login-box">

    <div class="logo">
      <div class="admin-badge">
        <div class="badge-dot"></div>
        Admin Portal
      </div>
      <div class="logo-ring"><span class="logo-icon">🔐</span></div>
      <h1>Anntya Store</h1>
      <p>Secure Admin Control Panel</p>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>Admin Password</label>
      <div class="input-wrap">
        <input type="password" id="passwordInput" placeholder="Enter your password..." autocomplete="current-password"/>
        <button class="eye-btn" type="button" onclick="toggleEye()" id="eyeBtn" title="Show/Hide">👁️</button>
      </div>
      <div class="err-msg" id="errMsg">⚠️ Galat password! Dobara try karo.</div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      🚀 Login to Admin Panel
    </button>

    <p class="footer-note">
      <span class="lock">🔒</span>
      Ye page sirf authorized admin ke liye hai.<br/>
      Unauthorized access strictly prohibited.
    </p>

    <div class="security-line">
      <div class="sec-dot"></div>
      <span>SSL Secured</span>
      <div class="sec-dot"></div>
      <span>Encrypted</span>
      <div class="sec-dot"></div>
      <span>Protected</span>
      <div class="sec-dot"></div>
    </div>

  </div>

<script>
  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function toggleEye() {
    const inp = document.getElementById('passwordInput');
    const btn = document.getElementById('eyeBtn');
    if (inp.type === 'password') {
      inp.type = 'text'; btn.textContent = '🙈';
    } else {
      inp.type = 'password'; btn.textContent = '👁️';
    }
  }

  async function doLogin() {
    const pass = document.getElementById('passwordInput').value.trim();
    const inp  = document.getElementById('passwordInput');
    const err  = document.getElementById('errMsg');
    const btn  = document.getElementById('loginBtn');

    if (!pass) {
      inp.classList.add('error-field');
      setTimeout(() => inp.classList.remove('error-field'), 600);
      err.textContent = '⚠️ Password daalo pehle!';
      err.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Checking...';
    err.classList.remove('show');

    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass }),
      });
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('admin_token', data.token);
        btn.innerHTML = '✅ Redirecting...';
        setTimeout(() => { window.location.href = '/admin.html'; }, 500);
      } else {
        inp.classList.add('error-field');
        setTimeout(() => inp.classList.remove('error-field'), 600);
        err.textContent = '⚠️ Galat password! Dobara try karo.';
        err.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '🚀 Login to Admin Panel';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    } catch (e) {
      err.textContent = '⚠️ Server se connect nahi ho pa raha!';
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '🚀 Login to Admin Panel';
    }
  }
</script>
</body>
</html>
