<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Anntya Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08080f;--surface:#111118;--card:#17171f;--card2:#1e1e28;
      --border:#252530;--border2:#2e2e3d;
      --accent:#7c5cfc;--accent2:#c084fc;--accent-glow:rgba(124,92,252,0.25);
      --text:#eeeef5;--text2:#b0b0c8;--muted:#666680;
      --error:#ff5f5f;--success:#10d9a0;
    }
    body{
      font-family:'Plus Jakarta Sans',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%,rgba(124,92,252,0.14) 0%,transparent 65%),
        radial-gradient(ellipse 50% 45% at 80% 85%,rgba(192,132,252,0.10) 0%,transparent 65%);
      pointer-events:none;z-index:0;
    }

    .login-box{
      position:relative;z-index:1;
      width:100%;max-width:400px;
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:24px;
      padding:40px 36px;
      box-shadow:0 24px 80px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.03) inset;
      animation:slideUp 0.5s cubic-bezier(.34,1.4,.64,1) both;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    .logo{text-align:center;margin-bottom:28px}
    .logo-icon{
      font-size:38px;display:block;margin-bottom:12px;
      animation:float 3s ease-in-out infinite;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

    .logo h1{
      font-family:'Syne',sans-serif;font-size:26px;font-weight:800;
      background:linear-gradient(140deg,#fff 0%,var(--accent2) 60%,var(--accent) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      letter-spacing:-0.5px;line-height:1.1;
    }
    .logo p{
      font-size:12px;color:var(--muted);margin-top:6px;font-weight:400;
    }

    .divider{height:1px;background:var(--border);margin:24px 0}

    .field{margin-bottom:18px}
    label{
      display:block;font-size:11px;font-weight:600;
      letter-spacing:1px;text-transform:uppercase;
      color:var(--muted);margin-bottom:8px;
    }

    .input-wrap{position:relative}
    input[type="password"],input[type="text"]{
      width:100%;
      background:var(--card2);
      border:1px solid var(--border2);
      border-radius:12px;
      padding:13px 46px 13px 16px;
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:14px;font-weight:400;
      color:var(--text);outline:none;
      transition:border-color 0.2s,box-shadow 0.2s;
      letter-spacing:1px;
    }
    input::placeholder{color:var(--muted);letter-spacing:0px;font-size:13px}
    input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow);
    }
    input.error-field{
      border-color:var(--error);
      box-shadow:0 0 0 3px rgba(255,95,95,0.18);
      animation:shake .35s ease;
    }
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%,60%{transform:translateX(-6px)}
      40%,80%{transform:translateX(6px)}
    }

    /* Eye toggle */
    .eye-btn{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:var(--muted);font-size:16px;padding:4px;
      transition:color 0.15s;line-height:1;
    }
    .eye-btn:hover{color:var(--text2)}

    /* Error msg */
    .err-msg{
      display:none;align-items:center;gap:6px;
      margin-top:10px;
      font-size:12px;font-weight:500;color:var(--error);
    }
    .err-msg.show{display:flex}
    .err-msg::before{content:'⚠️';font-size:13px}

    /* Submit btn */
    .btn-login{
      width:100%;padding:14px;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
      color:#fff;border:none;border-radius:13px;
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:14px;font-weight:700;
      cursor:pointer;margin-top:6px;
      box-shadow:0 8px 24px rgba(124,92,252,0.35);
      transition:all 0.2s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,92,252,0.45)}
    .btn-login:active{transform:translateY(0)}
    .btn-login:disabled{opacity:0.45;cursor:not-allowed;transform:none}

    .spinner{
      width:15px;height:15px;
      border:2px solid rgba(255,255,255,0.25);
      border-top-color:#fff;border-radius:50%;
      animation:spin 0.65s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .footer-note{
      text-align:center;margin-top:22px;
      font-size:11px;color:var(--muted);font-weight:400;line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <span class="logo-icon">🔐</span>
      <h1>Anntya Store</h1>
      <p>Admin Panel — Sirf authorized access</p>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>Admin Password</label>
      <div class="input-wrap">
        <input type="password" id="passwordInput" placeholder="Password daalo..." autocomplete="current-password"/>
        <button class="eye-btn" type="button" onclick="toggleEye()" id="eyeBtn" title="Show/Hide">👁️</button>
      </div>
      <div class="err-msg" id="errMsg">Galat password! Dobara try karo.</div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      Login Karo
    </button>

    <p class="footer-note">Ye page sirf admin ke liye hai.<br/>Unauthorized access allowed nahi hai.</p>
  </div>

<script>
  // Enter key se bhi login ho
  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function toggleEye() {
    const inp = document.getElementById('passwordInput');
    const btn = document.getElementById('eyeBtn');
    if (inp.type === 'password') {
      inp.type = 'text'; btn.textContent = '🙈';
    } else {
      inp.type = 'password'; btn.textContent = '👁️';
    }
  }

  async function doLogin() {
    const pass = document.getElementById('passwordInput').value.trim();
    const inp  = document.getElementById('passwordInput');
    const err  = document.getElementById('errMsg');
    const btn  = document.getElementById('loginBtn');

    if (!pass) {
      inp.classList.add('error-field');
      setTimeout(() => inp.classList.remove('error-field'), 600);
      err.textContent = '⚠️ Password daalo pehle!'; // shown via ::before so just update class
      err.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Checking...';
    err.classList.remove('show');

    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass }),
      });
      const data = await res.json();

      if (data.success) {
        // Token save karo
        sessionStorage.setItem('admin_token', data.token);
        btn.innerHTML = '✅ Redirecting...';
        setTimeout(() => { window.location.href = '/admin.html'; }, 500);
      } else {
        inp.classList.add('error-field');
        setTimeout(() => inp.classList.remove('error-field'), 600);
        err.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Login Karo';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    } catch (e) {
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'Login Karo';
    }
  }
</script>
</body>
</html>
