<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Login — Anntya Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
:root{
  --r:#e6196a; --p:#ff8c52;
  --cream:#fff8fb; --text:#180810; --text2:#7a5065;
  --border:#f5dce6; --sh:rgba(230,25,106,.16);
}
body{
  background:var(--cream); color:var(--text); min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(80px);animation:blobDrift 10s ease-in-out infinite;}
.b1{width:450px;height:450px;background:radial-gradient(circle,rgba(230,25,106,.1),transparent 70%);top:-150px;left:-150px;}
@keyframes blobDrift{0%,100%{transform:translate(0,0);} 50%{transform:translate(25px,-25px) scale(1.05);}}

.container{
  position:relative; z-index:1; width:100%; max-width:420px; 
  background:rgba(255,255,255,0.85); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px);
  padding:45px 35px; border-radius:35px; border:1px solid var(--border);
  box-shadow:0 25px 70px var(--sh); text-align:center;
  animation:fadeUp 0.7s ease-out both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);}}

.logo h1{font-family:'Cormorant Garamond',serif; font-size:38px; background:linear-gradient(135deg,var(--r),var(--p)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px;}
.logo p{font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:3px; margin-bottom:35px;}

.login-grid { display: grid; grid-template-columns: 1fr; gap: 18px; text-align: left; }
.form-group { position: relative; }
label{ display:block; font-size:10px; font-weight:700; color:var(--text2); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
input{
  width:100%; padding:14px 18px; border-radius:15px; border:1.5px solid var(--border);
  background:#fff; font-size:14px; transition:0.3s; outline:none;
}
input:focus{ border-color:var(--r); box-shadow:0 0 0 5px rgba(230,25,106,0.08); }

.btn-main{
  width:100%; padding:16px; border:none; border-radius:50px;
  background:linear-gradient(135deg,var(--r),var(--p)); color:#fff;
  font-size:15px; font-weight:700; cursor:pointer; margin-top:10px;
  box-shadow:0 10px 30px rgba(230,25,106,0.35); transition:0.3s;
}
.btn-main:hover{ transform:translateY(-3px); box-shadow:0 15px 35px rgba(230,25,106,0.45); }
.btn-main:disabled { opacity: 0.7; cursor: not-allowed; }

.switch-mode-btn {
  background: none; border: none; color: var(--r); font-size: 12px; font-weight: 700; cursor: pointer;
  margin-top: 20px; display: inline-block; padding: 8px 15px; border-radius: 12px; transition: 0.2s; border: 1px solid transparent;
}
.switch-mode-btn:hover { background: rgba(230,25,106,0.05); border-color: var(--border); }
.footer-links{ text-align:center; margin-top:35px; font-size:13px; color:var(--text2); }
.footer-links a{ color:var(--p); text-decoration:none; font-weight:700; border-bottom: 1.5px solid transparent; transition: 0.2s; }
.footer-links a:hover{ border-bottom-color: var(--p); }
.hidden { display: none; }
</style>
</head>
<body>
<div class="bg-wrap"><div class="blob b1"></div></div>
<div class="container">
  <div class="logo">
    <h1>Anntya</h1>
    <p>Welcome Back</p>
  </div>

  <div id="passwordSection">
    <form class="login-grid" id="loginPasswordForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="email@exyz.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter Your Password" required>
      </div>
      <button type="submit" class="btn-main" id="loginPassBtn">Login with Password 💖</button>
    </form>
    <button class="switch-mode-btn" onclick="toggleLogin('otp')">Login through OTP ⚡</button>
  </div>

  <div id="otpSection" class="hidden">
    <form class="login-grid">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="otpEmail" placeholder="Enter registered email" required>
      </div>
      <div class="form-group hidden" id="otpInputGroup">
        <label>Enter OTP</label>
        <input type="text" id="otpValue" maxlength="6" placeholder="123456">
      </div>
      <button type="button" class="btn-main" id="otpActionBtn" onclick="handleOTP()">Send OTP 📩</button>
    </form>
    <button class="switch-mode-btn" onclick="toggleLogin('password')">Login with Password 🔑</button>
  </div>

  <div class="footer-links">
    Don't have an account? <a href="userSignup.html">Sign Up here</a>
  </div>
</div>

<script>
  // ── Persistent Login Check (GitHub Style) ──
  window.onload = () => {
    const token = localStorage.getItem('user_token');
    if (token) {
      const redirectUrl = sessionStorage.getItem('redirect_after_login') || 'index.html';
      sessionStorage.removeItem('redirect_after_login'); 
      window.location.href = redirectUrl; 

    }
  };

  function toggleLogin(mode) {
    const passSec = document.getElementById('passwordSection');
    const otpSec = document.getElementById('otpSection');
    if(mode === 'otp') {
      passSec.classList.add('hidden');
      otpSec.classList.remove('hidden');
    } else {
      otpSec.classList.add('hidden');
      passSec.classList.remove('hidden');
    }
  }

  // ── Password Login Backend Logic ──
  document.getElementById('loginPasswordForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginPassBtn');
    
    btn.innerText = "Logging in... ⏳"; btn.disabled = true;

    try {
      const res = await fetch('/api/user/login-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if(data.success) {
        localStorage.setItem('user_token', data.token); // Hamesha ke liye login ho gaya!
        alert("Login Successful! ✨");
        const redirectUrl = sessionStorage.getItem('redirect_after_login') || 'index.html';
      sessionStorage.removeItem('redirect_after_login'); // clear it
      window.location.href = redirectUrl; 

      } else {
        alert(data.message);
      }
    } catch (err) { alert("Server error"); }
    
    btn.innerText = "Login with Password 💖"; btn.disabled = false;
  };

  // ── OTP Backend Logic ──
  async function handleOTP() {
    const email = document.getElementById('otpEmail').value;
    const btn = document.getElementById('otpActionBtn');
    const otpGroup = document.getElementById('otpInputGroup');
    const otpInput = document.getElementById('otpValue');

    if(!email) return alert("Please enter email!");

    // SEND OTP
    if(btn.innerText === "Send OTP 📩") {
      btn.innerText = "Sending Email... ⏳"; btn.disabled = true;
      try {
        const res = await fetch('/api/user/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        
        if(data.success) {
          otpGroup.classList.remove('hidden');
          btn.innerText = "Verify & Login ✨";
          alert("OTP has been sent to your email!");
        } else {
          btn.innerText = "Send OTP 📩";
          alert(data.message);
        }
      } catch (e) { alert("Server Error"); btn.innerText = "Send OTP 📩"; }
      btn.disabled = false;
    } 
    // VERIFY OTP
    else {
      const otp = otpInput.value;
      if(!otp) return alert("Please enter OTP!");
      
      btn.innerText = "Verifying... ⏳"; btn.disabled = true;
      try {
        const res = await fetch('/api/user/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp })
        });
        const data = await res.json();

        if(data.success) {
          localStorage.setItem('user_token', data.token); // Hamesha ke liye login!
          alert("Login Successful! ✨");
          window.location.href = 'index.html'; // Redirect
        } else {
          btn.innerText = "Verify & Login ✨";
          alert(data.message);
        }
      } catch (e) { alert("Server Error"); btn.innerText = "Verify & Login ✨"; }
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
