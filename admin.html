<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel – Anntya Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#030306;--surface:#09090f;--card:#0f0f17;--card2:#14141e;
      --border:#1a1a26;--border2:#222232;
      --accent:#6b4de6;--accent2:#a855f7;--accent-glow:rgba(107,77,230,0.22);
      --text:#e8e8f2;--text2:#9898b8;--muted:#55556e;
      --success:#00c07f;--price:#00d97e;--price-glow:rgba(0,217,126,0.18);
      --error:#f05050;--warn:#f5a623;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:48px 20px 100px;
    }
    body.modal-open{overflow:hidden}
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 55% 40% at 10% 0%,rgba(107,77,230,0.11) 0%,transparent 65%),
        radial-gradient(ellipse 40% 35% at 90% 90%,rgba(168,85,247,0.07) 0%,transparent 65%);
      pointer-events:none;z-index:0;
    }

    /* Grid BG */
    body::after{
      content:'';position:fixed;inset:0;z-index:0;
      background-image:
        linear-gradient(rgba(107,77,230,0.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(107,77,230,0.025) 1px,transparent 1px);
      background-size:52px 52px;pointer-events:none;
    }

    .wrapper{position:relative;z-index:1;width:100%;max-width:980px}

    /* ── Header ── */
    header{text-align:center;margin-bottom:44px}
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;
      color:var(--accent2);border:1px solid rgba(168,85,247,0.22);
      background:rgba(168,85,247,0.06);padding:5px 16px;border-radius:100px;margin-bottom:18px;
    }
    .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:blink 2s ease infinite;flex-shrink:0}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    h1{
      font-family:'Syne',sans-serif;font-size:clamp(26px,5vw,46px);font-weight:800;
      background:linear-gradient(140deg,#fff 0%,var(--accent2) 60%,var(--accent) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      line-height:1.08;letter-spacing:-1px;
    }
    .subtitle{color:var(--muted);margin-top:10px;font-size:13px;font-weight:400}
    .subtitle span{color:var(--accent2);font-weight:500}

    /* ── Divider ── */
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .divider-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text2);letter-spacing:0.5px;white-space:nowrap}
    .divider-line{flex:1;height:1px;background:var(--border)}

    /* ── Form Card ── */
    .form-card{
      background:var(--surface);border:1px solid var(--border);border-radius:22px;
      padding:32px;box-shadow:0 20px 70px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.02) inset;
      margin-bottom:14px;
    }
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:580px){.form-row{grid-template-columns:1fr}}
    .field{margin-bottom:18px}
    .field:last-of-type{margin-bottom:0}
    label{display:flex;align-items:center;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
    label .req{color:var(--accent2);margin-left:3px;font-size:13px;line-height:1}

    input[type="text"],input[type="number"],textarea{
      width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:11px;
      padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;
      color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;line-height:1.5;
    }
    input::placeholder,textarea::placeholder{color:var(--muted);font-weight:400}
    input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:var(--card)}
    textarea{resize:vertical;min-height:88px;line-height:1.6}

    /* ── Category Autocomplete ── */
    .cat-wrap{position:relative}
    .cat-suggestions{
      position:absolute;top:calc(100% + 4px);left:0;right:0;
      background:#111120;border:1px solid var(--border2);border-radius:11px;
      max-height:200px;overflow-y:auto;z-index:500;display:none;
      box-shadow:0 12px 36px rgba(0,0,0,0.6);
    }
    .cat-suggestions.show{display:block}
    .cat-item{padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s,color 0.15s}
    .cat-item:last-child{border-bottom:none}
    .cat-item:hover,.cat-item.active{background:rgba(107,77,230,0.18);color:var(--accent2)}
    .cat-add-btn{padding:10px 14px;font-size:12px;color:var(--success);cursor:pointer;border-top:1px solid var(--border2);display:flex;align-items:center;gap:6px}
    .cat-add-btn:hover{background:rgba(0,192,127,0.08)}

    /* ── Date Picker ── */
    .date-input-wrap{position:relative}
    .date-display{
      width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:11px;
      padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;
      display:flex;align-items:center;justify-content:space-between;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    .date-display:hover,.date-display.open{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    .date-display .placeholder{color:var(--muted)}
    .date-picker-popup{
      position:absolute;top:calc(100% + 6px);left:0;
      background:#111120;border:1px solid var(--border2);border-radius:14px;
      padding:18px;z-index:600;display:none;
      box-shadow:0 18px 50px rgba(0,0,0,0.7);min-width:280px;
    }
    .date-picker-popup.show{display:block}
    .dp-step-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .dp-grid-month{grid-template-columns:repeat(3,1fr)}
    .dp-grid-year{grid-template-columns:repeat(4,1fr)}
    .dp-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12px;cursor:pointer;color:var(--text2);transition:background 0.15s,color 0.15s;border:1px solid transparent}
    .dp-cell:hover{background:rgba(107,77,230,0.2);color:var(--accent2)}
    .dp-cell.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
    .dp-cell.today{border-color:var(--accent2);color:var(--accent2)}
    .dp-cell.day-label{font-size:10px;font-weight:700;color:var(--muted);cursor:default;aspect-ratio:auto;padding:2px 0}
    .dp-cell.day-label:hover{background:none;color:var(--muted)}
    .dp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .dp-nav-btn{background:var(--card2);border:1px solid var(--border2);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .dp-nav-btn:hover{background:rgba(107,77,230,0.2);color:var(--accent2);border-color:var(--accent)}
    .dp-nav-title{font-size:13px;font-weight:600;color:var(--text)}
    .dp-actions{display:flex;justify-content:flex-end;margin-top:14px;gap:8px}
    .dp-clear{font-size:12px;color:var(--muted);cursor:pointer;padding:6px 10px;border-radius:7px;transition:all 0.15s}
    .dp-clear:hover{color:var(--error);background:rgba(240,80,80,0.08)}

    /* ── File Drop ── */
    .file-drop{border:1.5px dashed var(--border2);border-radius:13px;padding:22px 20px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative}
    .file-drop:hover,.file-drop.dragover{border-color:var(--accent);background:rgba(107,77,230,0.06)}
    .file-drop input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:26px;margin-bottom:6px}
    .drop-text{font-size:13px;color:var(--muted);font-weight:400;line-height:1.5}
    .drop-text strong{color:var(--accent2);font-weight:600}
    .file-preview{margin-top:10px;display:none;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:10px 14px}
    .file-preview img{width:42px;height:42px;object-fit:cover;border-radius:8px}
    .file-preview .fname{font-size:12px;color:var(--text2);font-weight:500;word-break:break-all}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.2px}
    .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none !important}
    .btn-primary{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;width:100%;padding:15px;font-size:14px;font-weight:700;letter-spacing:0.3px;border-radius:13px;margin-top:8px;box-shadow:0 8px 24px rgba(107,77,230,0.35)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(107,77,230,0.45)}
    .btn-primary:active{transform:translateY(0)}
    .btn-cancel{background:var(--card2);color:var(--text2);border:1px solid var(--border2);font-size:13px;padding:11px 22px;border-radius:10px}
    .btn-cancel:hover{background:var(--card);color:var(--text)}
    .btn-update{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;padding:11px 24px;border-radius:10px;box-shadow:0 6px 18px rgba(107,77,230,0.3)}
    .btn-update:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(107,77,230,0.4)}
    .btn-confirm-del{background:linear-gradient(135deg,#f05050,#d03030);color:#fff;font-size:13px;font-weight:700;padding:11px 24px;border-radius:10px;box-shadow:0 6px 18px rgba(240,80,80,0.3)}
    .btn-confirm-del:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(240,80,80,0.4)}

    /* ── Spinner ── */
    .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin 0.65s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Toast ── */
    #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);padding:12px 22px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;opacity:0;transition:all 0.3s cubic-bezier(.34,1.56,.64,1);z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.success{background:linear-gradient(135deg,#00c07f,#009966)}
    #toast.error{background:linear-gradient(135deg,#f05050,#d03030)}
    #toast.warn{background:linear-gradient(135deg,#f5a623,#e08e10)}

    /* ── Products Section ── */
    #products-section{margin-top:52px}

    /* ══════════════════════════════════════════════
       5-COLUMN TABLE
       Col 1: Image  |  Col 2: Exp+Qty  |  Col 3: Price  |  Col 4: Edit  |  Col 5: Delete
    ══════════════════════════════════════════════ */
    .table-header{
      display:grid;
      grid-template-columns:80px 1fr 130px 80px 80px;
      gap:0;
      background:var(--card2);border:1px solid var(--border);
      border-radius:14px 14px 0 0;
      padding:12px 18px;margin-bottom:2px;
    }
    .th{
      font-size:10px;font-weight:700;letter-spacing:1.4px;
      text-transform:uppercase;color:var(--muted);
      display:flex;align-items:center;
    }
    .th.center{justify-content:center}

    .product-row{
      display:grid;
      grid-template-columns:80px 1fr 130px 80px 80px;
      gap:0;
      background:var(--surface);border:1px solid var(--border);
      border-top:none;padding:14px 18px;
      transition:background 0.18s,border-color 0.18s;
      align-items:center;
      animation:fadeUp 0.35s ease both;
    }
    .product-row:nth-child(even){background:var(--card)}
    .product-row:hover{background:rgba(107,77,230,0.06);border-color:var(--border2)}
    .product-row:last-child{border-radius:0 0 14px 14px}
    .product-row:only-child{border-radius:14px;border-top:1px solid var(--border)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* ── Col 1: Image ── */
    .col-img{display:flex;align-items:center;justify-content:flex-start}
    .row-img{
      /* Natural aspect ratio preserved */
      width:60px;
      height:auto;
      max-height:76px;
      object-fit:contain;
      border-radius:10px;
      cursor:pointer;
      transition:transform 0.22s,box-shadow 0.22s,opacity 0.2s;
      display:block;
      border:1.5px solid var(--border2);
      background:var(--card2);
    }
    .row-img:hover{transform:scale(1.06);box-shadow:0 8px 24px rgba(0,0,0,0.6);opacity:0.9}
    .img-ph{
      width:60px;height:60px;background:var(--card2);border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-size:22px;
      border:1.5px solid var(--border2);
    }

    /* ── Col 2: Exp Date + Qty ── */
    .col-expqty{padding:0 12px;min-width:0;display:flex;flex-direction:column;gap:6px}
    .expqty-row{display:flex;align-items:center;gap:6px}
    .expqty-label{
      font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
      color:var(--muted);min-width:28px;
    }
    .expqty-val{
      font-family:'JetBrains Mono',monospace;
      font-size:12px;font-weight:500;color:var(--text2);
      background:var(--card2);border:1px solid var(--border);
      padding:3px 8px;border-radius:6px;letter-spacing:0.3px;
    }
    .expqty-val.qty{color:var(--accent2)}
    .expqty-val.exp-soon{color:#f5a623;border-color:rgba(245,166,35,0.25);background:rgba(245,166,35,0.06)}
    .expqty-val.expired{color:var(--error);border-color:rgba(240,80,80,0.25);background:rgba(240,80,80,0.06)}
    .expqty-val.no-date{color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px}

    /* ── Col 3: Price ── */
    .col-price{display:flex;align-items:center;justify-content:center}
    .row-price{
      font-family:'JetBrains Mono',monospace;
      font-size:16px;font-weight:700;
      color:var(--price);
      text-shadow:0 0 18px var(--price-glow);
      letter-spacing:-0.5px;
      display:inline-flex;align-items:baseline;gap:2px;
    }
    .price-symbol{font-size:11px;font-weight:500;opacity:0.75;margin-right:1px}

    /* ── Col 4 & 5: Actions ── */
    .col-action{display:flex;align-items:center;justify-content:center}
    .btn-edit{
      background:rgba(107,77,230,0.1);color:var(--accent2);
      border:1px solid rgba(107,77,230,0.22);
      font-size:11px;font-weight:600;padding:7px 12px;border-radius:9px;
      letter-spacing:0.3px;cursor:pointer;transition:all 0.15s;
      font-family:'DM Sans',sans-serif;
      display:inline-flex;align-items:center;gap:4px;
    }
    .btn-edit:hover{background:rgba(107,77,230,0.22);transform:translateY(-1px);box-shadow:0 4px 12px rgba(107,77,230,0.2)}
    .btn-delete{
      background:rgba(240,80,80,0.08);color:var(--error);
      border:1px solid rgba(240,80,80,0.2);
      font-size:11px;font-weight:600;padding:7px 12px;border-radius:9px;
      letter-spacing:0.3px;cursor:pointer;transition:all 0.15s;
      font-family:'DM Sans',sans-serif;
      display:inline-flex;align-items:center;gap:4px;
    }
    .btn-delete:hover{background:rgba(240,80,80,0.18);transform:translateY(-1px);box-shadow:0 4px 12px rgba(240,80,80,0.15)}

    /* Uploading row */
    .row-uploading{opacity:0.55;pointer-events:none}
    .up-spinner-sm{width:18px;height:18px;border:2px solid rgba(107,77,230,0.2);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite}

    #no-products{
      color:var(--muted);font-size:13px;font-weight:500;text-align:center;
      padding:52px 20px;border:1px dashed var(--border2);border-radius:18px;line-height:1.7;
    }
    #no-products .no-icon{font-size:32px;display:block;margin-bottom:10px}

    /* ── Modals ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border:1px solid var(--border2);border-radius:22px;padding:30px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;transform:scale(0.93) translateY(10px);transition:transform 0.28s cubic-bezier(.34,1.4,.64,1);box-shadow:0 32px 80px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.03) inset}
    .modal-overlay.open .modal{transform:scale(1) translateY(0)}
    .modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:10px}
    .modal-header h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.3px;line-height:1.2}
    .modal-header p{font-size:12px;color:var(--muted);margin-top:4px;font-weight:400}
    .modal-close{background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-size:16px;cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
    .modal-close:hover{background:var(--card);color:var(--text)}
    .modal-footer{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}

    .img-section-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
    .current-img-wrap{border-radius:12px;overflow:hidden;border:1px solid var(--border2);margin-bottom:14px;background:var(--card2)}
    .current-img{width:100%;height:130px;object-fit:contain;display:block}
    .edit-preview-img{width:100%;max-height:120px;object-fit:contain;border-radius:10px;margin-top:9px;border:1px solid var(--border2);display:none}
    .edit-preview-img.show{display:block}

    /* Delete modal */
    #deleteModal .modal{max-width:380px;text-align:center}
    .del-icon{font-size:44px;margin-bottom:14px;display:block;animation:shake 0.5s ease 0.2s both}
    @keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
    #deleteModal h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px;letter-spacing:-0.3px}
    #deleteModal .del-desc{font-size:13px;color:var(--muted);font-weight:400;line-height:1.6}
    #deleteModal .del-name{color:var(--error);font-weight:600}
    #deleteModal .modal-footer{justify-content:center;gap:12px}

    /* ── Image Lightbox ── */
    #lightbox{
      position:fixed;inset:0;background:rgba(0,0,0,0.94);backdrop-filter:blur(14px);
      z-index:2000;display:none;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;padding:24px;
    }
    #lightbox.show{display:flex}
    #lightbox-img{
      max-width:88vw;max-height:72vh;
      /* Natural ratio preserved */
      object-fit:contain;
      border-radius:16px;
      box-shadow:0 24px 80px rgba(0,0,0,0.85),0 0 0 1px rgba(255,255,255,0.06);
      display:block;
    }
    #lightbox-close{
      position:fixed;top:20px;right:20px;background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:20px;
      width:40px;height:40px;border-radius:10px;cursor
