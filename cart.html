<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Your Cart — Anntya</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
:root{
  --r:#e6196a;--r2:#ff5f98;--p:#ff8c52;--gold:#f5c340;
  --cream:#fff8fb;--white:#fff;--text:#180810;--text2:#7a5065;--text3:#c8a8b5;
  --border:#f5dce6;--sh:rgba(230,25,106,.16);--soft:rgba(0,0,0,.055);
}
html,body{touch-action:manipulation;-webkit-overflow-scrolling:touch;overflow-x:hidden;}
body{background:var(--cream);color:var(--text);
  padding:env(safe-area-inset-top) env(safe-area-inset-right) 120px env(safe-area-inset-left);
  min-height:100vh;}

/* Ambient */
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(90px);animation:blobDrift 12s ease-in-out infinite;}
.b1{width:460px;height:460px;background:radial-gradient(circle,rgba(255,155,195,.25),transparent 68%);top:-150px;left:-120px;}
.b2{width:380px;height:380px;background:radial-gradient(circle,rgba(255,175,130,.2),transparent 68%);bottom:100px;right:-100px;animation-delay:-5s;}
@keyframes blobDrift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-20px) scale(1.06);}}

/* Page header */
.page-header{position:sticky;top:0;z-index:100;
  background:rgba(255,248,251,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:14px 16px 12px;
  display:flex;align-items:center;gap:12px;
  animation:slideDown .5s ease both;}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
.back-btn{width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--r),var(--p));
  display:flex;align-items:center;justify-content:center;
  color:#fff;text-decoration:none;font-size:18px;
  box-shadow:0 4px 12px var(--sh);transition:all .22s;flex-shrink:0;}
.back-btn:hover{transform:scale(1.08);}
h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;
  background:linear-gradient(135deg,var(--r),var(--p));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* Cart container */
.cart-container{max-width:680px;margin:0 auto;padding:16px 14px 0;position:relative;z-index:1;}

/* Cart item */
.cart-item{display:flex;gap:14px;background:#fff;padding:14px;border-radius:20px;
  margin-bottom:12px;align-items:center;
  box-shadow:0 4px 24px var(--soft);border:1px solid var(--border);
  animation:cardUp .4s cubic-bezier(.34,1.56,.64,1) both;
  transition:transform .25s,box-shadow .25s;position:relative;overflow:hidden;}
.cart-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--r),var(--p));border-radius:4px 0 0 4px;}
.cart-item:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(230,25,106,.1);}
@keyframes cardUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.cart-item img{width:88px;height:88px;object-fit:cover;border-radius:14px;
  border:1px solid var(--border);flex-shrink:0;box-shadow:0 4px 12px var(--soft);}

.cart-details{flex:1;min-width:0;}
.cart-title{font-size:15px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cart-price{font-size:16px;font-weight:700;margin-top:5px;
  background:linear-gradient(135deg,var(--r),var(--p));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.quantity{display:flex;align-items:center;gap:10px;margin-top:10px;}
.quantity button{width:30px;height:30px;border:none;
  background:linear-gradient(135deg,var(--r),var(--p));
  color:#fff;font-size:18px;border-radius:50%;cursor:pointer;
  box-shadow:0 3px 10px var(--sh);transition:all .22s;
  display:flex;align-items:center;justify-content:center;font-weight:700;}
.quantity button:hover{transform:scale(1.12);}
.quantity span{font-size:16px;font-weight:600;min-width:24px;text-align:center;}

.remove-btn{margin-top:8px;background:rgba(230,25,106,.08);color:var(--r);
  border:1px solid rgba(230,25,106,.2);padding:5px 12px;border-radius:20px;
  cursor:pointer;font-size:12px;font-weight:600;font-family:'Poppins',sans-serif;
  transition:all .2s;}
.remove-btn:hover{background:rgba(230,25,106,.16);transform:scale(1.04);}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text2);
  font-size:16px;font-weight:500;}
.empty::before{content:'🛒';display:block;font-size:56px;margin-bottom:16px;
  animation:bounce .8s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-12px);}}

/* Total box — sticky bottom */
.total-box{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:14px 18px calc(14px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 40px rgba(230,25,106,.1);}
.total-inner{max-width:680px;margin:0 auto;}
.total{font-size:18px;font-weight:700;color:var(--text);margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;}
.total span{font-size:20px;font-weight:800;
  background:linear-gradient(135deg,var(--r),var(--p));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.checkout{width:100%;padding:14px;border:none;
  background:linear-gradient(135deg,var(--r),var(--p));
  color:#fff;font-size:16px;font-weight:700;border-radius:50px;cursor:pointer;
  font-family:'Poppins',sans-serif;
  box-shadow:0 8px 28px rgba(230,25,106,.35);
  transition:all .28s;position:relative;overflow:hidden;}
.checkout::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  transform:translateX(-100%);transition:transform .5s;}
.checkout:hover::after{transform:translateX(100%);}
.checkout:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(230,25,106,.42);}
.checkout:active{transform:translateY(0);}
</style>
</head>
<body>

<div class="bg-wrap"><div class="blob b1"></div><div class="blob b2"></div></div>

<div class="page-header">
  <a class="back-btn" href="index.html">&#8592;</a>
  <h1>My Cart</h1>
</div>

<div class="cart-container" id="cartContainer"></div>

<div class="total-box">
  <div class="total-inner">
    <div class="total" id="totalPrice">Total: ₹0</div>
    <button class="checkout">Proceed to Checkout ✨</button>
  </div>
</div>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const container = document.getElementById("cartContainer");

  function renderCart() {
    container.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
      container.innerHTML = `<div class="empty">Cart is Empty</div>`;
      document.getElementById("totalPrice").innerText = "Total: ₹0";
      return;
    }

    cart.forEach((p, index) => {
      // Har item ka total calculate karna (Price * Quantity)
      let itemQty = p.qty || 1;
      total += p.price * itemQty;

      const item = document.createElement("div");
      item.className = "cart-item";
      item.innerHTML = `
        <img src="${p.image}">
        <div class="cart-details">
          <div class="cart-title">${p.title}</div>
          <div class="cart-price">₹${p.price}</div>
          <div class="quantity">
            <button onclick="decrease(${index})">-</button>
            <span>${itemQty}</span>
            <button onclick="increase(${index})">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
        </div>
      `;
      container.appendChild(item);
    });

    document.getElementById("totalPrice").innerText = "Total: ₹" + total;
  }

  function increase(i) {
    cart[i].qty = (cart[i].qty || 1) + 1;
    saveAndRefresh();
  }

  function decrease(i) {
    if ((cart[i].qty || 1) > 1) {
      cart[i].qty--;
      saveAndRefresh();
    }
  }

  function removeItem(i) {
    cart.splice(i, 1);
    saveAndRefresh();
  }

  // Common function to save data and update UI
  function saveAndRefresh() {
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  // Initial call
  renderCart();
</script>
</body>
</html>
