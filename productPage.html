<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="transparent">
<title>Product Details</title>

<style>
html, body { touch-action: manipulation; overscroll-behavior: none; }
input, textarea { font-size: 16px; }
body{
  padding-top: env(safe-area-inset-top); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right);
  font-family: "Poppins", sans-serif;
}

:root {
  --bg: #1e1e2f; --text: #f0f0f0; --accent: #ff6f91; --accent2: #ff9671; --box-bg: #2e2e3e; --card: #f4f4f8;
}
.light-theme {
  --bg: #fafafa; --text: #222; --accent: #ff4e88; --accent2: #ffb26b; --box-bg: #ffffff; --card: #f4f4f8;
}

.product-page{ max-width:900px; margin:auto; padding:20px; background-color:#e9f0f1; border-radius: 10px;}
.product-img{ width:100%; border-radius:20px; overflow:hidden; }
.product-img img{ width:100%; height:auto; object-fit:cover; display: none; /* Initially hidden */ }

.product-details{ margin-top:20px; background:white; padding:20px; border-radius:15px; }
.product-details h1{ font-size:26px; }
.price{ font-size:22px; color:#ff4e88; margin:10px 0; font-weight: bold;}
.desc{ color:#444; line-height:1.5; }

.buy-btn, .share-btn {
  margin-top:20px; padding:12px 25px; border:none; border-radius:25px; font-size:16px; cursor:pointer; display: none; /* Initially hidden */
}
.buy-btn { background:linear-gradient(90deg,#f77ca4,#feddbf); color:white; }
.share-btn { background:linear-gradient(90deg,#7c68eaef,#b2f0ffd4); color:white; margin-left: 10px;}
.buy-btn:hover, .share-btn:hover { opacity:0.85; }

/* 🪄 SKELETON CSS FOR PRODUCT PAGE */
@keyframes shimmer { 0% { background-position: -500px 0; } 100% { background-position: 500px 0; } }
.skeleton {
  background: #e0e0e0;
  background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
  background-size: 500px 100%; animation: shimmer 1.5s infinite linear; border-radius: 10px;
}
.skel-img { height: 350px; width: 100%; }
.skel-title { height: 30px; width: 70%; margin-bottom: 15px; }
.skel-price { height: 25px; width: 40%; margin-bottom: 20px; }
.skel-desc { height: 15px; width: 100%; margin-bottom: 8px; }
.skel-btn { height: 45px; width: 130px; display: inline-block; margin-top: 20px; border-radius: 25px; }
</style>
</head>
<body class="light-theme">

<div class="product-page">
  <div class="product-img skeleton skel-img" id="img-skeleton"></div>
  <div class="product-img"><img id="image"></div>

  <div class="product-details">
    <div class="skeleton skel-title" id="title-skeleton"></div>
    <h1 id="title"></h1>

    <div class="skeleton skel-price" id="price-skeleton"></div>
    <div class="price" id="price"></div>

    <div id="desc-skeleton">
      <div class="skeleton skel-desc"></div>
      <div class="skeleton skel-desc" style="width: 80%"></div>
      <div class="skeleton skel-desc" style="width: 60%"></div>
    </div>
    <p class="desc" id="desc"></p>

    <div class="skeleton skel-btn" id="btn1-skeleton"></div>
    <div class="skeleton skel-btn" id="btn2-skeleton" style="margin-left: 10px;"></div>

    <button class="buy-btn" id="buyBtn" onclick="addToCart()">Add to Cart 🛒</button>
    <button class="share-btn" id="shareBtn" onclick="shareProduct()">Share 📤</button>
  </div>
</div>

<script src="addProduct.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  let product = null;

  window.productsReady.then(function() {
    product = products.find(p => p._id === id);

    if (!product) {
      document.getElementById("title").innerText = "Product not found";
      return;
    }

    // Hide Skeletons
    document.getElementById("img-skeleton").style.display = "none";
    document.getElementById("title-skeleton").style.display = "none";
    document.getElementById("price-skeleton").style.display = "none";
    document.getElementById("desc-skeleton").style.display = "none";
    document.getElementById("btn1-skeleton").style.display = "none";
    document.getElementById("btn2-skeleton").style.display = "none";

    // Show Real Data
    document.getElementById("image").src = product.image;
    document.getElementById("image").style.display = "block";
    document.getElementById("title").innerText = product.title;
    document.getElementById("price").innerText = "₹" + Number(product.price).toLocaleString('en-IN');
    document.getElementById("desc").innerText = product.desc;
    
    document.getElementById("buyBtn").style.display = "inline-block";
    document.getElementById("shareBtn").style.display = "inline-block";
  });


window.productsReady.then(() => {
  const current = products.find(p => p._id === id);
  // ... (Current product render logic) ...

  // Neeche baaki products dikhao
  const otherContainer = document.getElementById('productContainer');
  const others = products.filter(p => p._id !== id).slice(0, 6); // 6 random products
  others.forEach(p => {
    // Card banane ka wahi purana logic yahan dalo
  });
});

  function shareProduct(){
    const shareData = { url: window.location.href };
    if(navigator.share){ navigator.share(shareData); }
    else{ window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(product.title + " - ₹" + product.price + " " + window.location.href), "_blank"); }
  }

  function addToCart(){
    if (!product) return;
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let existingProduct = cart.find(item => item.title === product.title);
    if (existingProduct) { existingProduct.qty = (existingProduct.qty || 1) + 1; } 
    else { cart.push({ ...product, qty: 1 }); }
    localStorage.setItem("cart", JSON.stringify(cart));
    window.location.href = "cart.html";
  }
</script>

</body>
</html>
