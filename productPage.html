<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">
<meta name="theme-color" content="transparent">
<title>Product</title>

<style>

html, body {
    touch-action: manipulation;
    overscroll-behavior: none;
    -ms-touch-action: manipulation;
  }

input, textarea {
  font-size: 16px;
}

body{
padding-top: env(safe-area-inset-top);
padding-left: env(safe-area-inset-left);
padding-right: env(safe-area-inset-right);
}

    :root {
      --bg: #1e1e2f;
      --text: #f0f0f0;
      --accent: #ff6f91;
      --accent2: #ff9671;
      --box-bg: #2e2e3e;
      --card: #f4f4f8;
    }

    .light-theme {
      --bg: #fafafa;
      --text: #222;
      --accent: #ff4e88;
      --accent2: #ffb26b;
      --box-bg: #ffffff;
      --card: #f4f4f8;
    }

.product-page{
  max-width:900px;
  margin:auto;
  padding:20px;
  background-color:#e9f0f1;
}

.product-img{
  width:100%;
  border-radius:20px;
  overflow:hidden;
}

.product-img img{
  width:100%;
  height:auto;
  object-fit:cover;
}

.product-details{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:15px;
}

.product-details h1{
  font-size:26px;
}

.price{
  font-size:22px;
  color:#ff4e88;
  margin:10px 0;
}

.desc{
  color:#444;
  line-height:1.5;
}

.buy-btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#ff4e88,#ffb26b);
  color:white;
  font-size:16px;
  cursor:pointer;
}

    #productContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
      margin: 20px;
    }
    
    .card {
      background: var(--card);
      border-radius: 15px;
      overflow: hidden;
      text-align: center;
      padding: 15px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }
    
    .card img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    
    .card h3 {
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 5px;
    }
    
    .card p {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 12px;
    }
    
    .btn {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    
    .btn:hover {
      opacity: 0.85;
    }
    
</style>
</head>

<body>

<div class="product-page">

<div class="product-img">
<img id="image">
</div>

<div class="product-details">
<h1 id="title"></h1>
<div class="price" id="price"></div>
<p class="desc" id="desc"></p>

<button class="buy-btn">Add to Cart</button>

</div>

</div>

<div class="container" id="productContainer"></div>

<script src="addProduct.js"></script>
<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const product = products[id];

document.getElementById("image").src = product.image;
document.getElementById("title").innerText = product.title;
document.getElementById("price").innerText = "₹" + product.price;
document.getElementById("desc").innerText = product.desc;



</script>

</body>
</html>
